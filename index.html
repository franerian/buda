<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buda Casa Productora</title>
  <link rel="icon" type="image/png" href="logo_buda.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #080808;
      color: #F0EDE8;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      width: 72px;
      height: auto;
      opacity: 0.92;
    }

    h1 {
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #F0EDE8;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="logo_buda.jpg" alt="Buda Casa Productora">
    <h1>Muy pronto.</h1>
  </div>
</body>
</html>
